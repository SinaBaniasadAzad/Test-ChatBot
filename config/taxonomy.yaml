# ============================================================================
#  Taxonomy — تعریف دسته‌ها (منبع واحد حقیقت)
# ----------------------------------------------------------------------------
#  افزودن دستهٔ جدید = افزودن یک بلوک label اینجا. هیچ تغییری در کد لازم نیست.
#
#  هر «layer» یک بُعد دسته‌بندی است. هر «label» یک گزینه در آن بُعد.
#  - id    : slug پایدار و یکتا (مدل همین را برمی‌گرداند، نه نام نمایشی)
#  - name  : نام نمایشی
#  - definition : تعریف دقیق (به مدل تزریق می‌شود)
#  - cues  : کلمات/عبارات نشانه‌ای (فارسی و انگلیسی). فقط «راهنما» هستند، نه قانون قطعی.
# ============================================================================

meta:
  languages: [fa, en]
  notes: "Layer ids are JSON keys in the model output. Label ids are stable slugs."

layers:
  # -------------------------------------------------------------------------
  - id: layer1
    name: "Type / نوع درخواست"
    role: intent
    description: >
      قصدِ کاربر را مشخص می‌کند، مستقل از حوزه (Domain).
      برای انتخاب بین Incident و Service Request به «قصد» نگاه کن، نه ادبِ کلمات:
        • Incident = چیزی که باید کار کند خراب/مختل شده و باید به حالت عادی برگردد
          (خطا، پیام خطا، قطعی، کرش، نتیجهٔ نادرست، یا عملکردی که قبلاً بود و حالا نیست).
        • Service Request = درخواستِ فراهم‌کردن/اعطا/ایجاد/فعال‌سازی/پیکربندیِ چیزی
          (دسترسی، حساب، نقش، مجوز، فعال/غیرفعال‌کردن قابلیت، افزایش سقف، یا ارائهٔ اطلاعات)
          که کاربر تا کنون نداشته؛ هیچ‌چیز خراب نشده.
      کلماتی مثل «مشکل»، «نمی‌توانم»، «امکان‌پذیر نیست» به‌تنهایی تعیین‌کننده نیستند و ممکن
      است در هر دو بیایند. آزمونِ تصمیم: آیا چیزی خراب شده که باید «تعمیر» شود (Incident)،
      یا چیزی باید «فراهم/اعطا» شود (Service Request)؟ اگر کاربر هم از خطا می‌گوید و هم
      چیزی می‌خواهد، برچسب را بر اساسِ «خواستهٔ اصلیِ» تیکت انتخاب کن.
    labels:
      - id: incident
        name: "Incident"
        definition: >
          اختلال در سرویسی که باید کار کند: خطا/پیام خطا، کرش، قطعی، نتیجهٔ نادرست، یا
          چیزی که قبلاً درست کار می‌کرد و حالا از کار افتاده. کاربر می‌خواهد عملکردِ
          خراب‌شده به حالت عادی برگردد. صرفِ وجودِ «مشکل» یا «نمی‌توانم» کافی نیست؛ باید
          یک خرابی/خطای واقعی در عملکرد باشد. اگر کاربر چیزی *جدید* (دسترسی/حساب/نقش/
          فعال‌سازی) می‌خواهد که تا کنون نداشته، این Incident نیست بلکه Service Request است.
        cues:
          - عدم ثیت
          # - مشکل
          - غیبت
          - کسر کار
          - قطع
          - پردازش نشده
          - همپوشانی
          # - "خطا می‌دهد"
          # - "خطا می‌گیرم"
          # - خطا
          # - error
          # - "پیام خطا"
          # - کرش
          # - crash
          # - "از کار افتاد"
          # - "کار نمی‌کند"
          # - "قطع شد"
          # - قطعی
          # - "بالا نمی‌آید"
          # - "لود نمی‌شود"
          # - "نمایش نمی‌دهد"
          # - "به درستی ثبت نشده"
          # - "ثبت نمی‌شود"
          # - "اشتباه محاسبه"
          # - ناموفق
          # - failed
      - id: service_request
        name: "Service Request"
        definition: >
          درخواست برای فراهم‌کردن، اضافه کردن، ایجاد، فعال‌سازی، یا پیکربندیِ چیزی — مانند
          دسترسی، حساب کاربری، نقش، مجوز، فعال/غیرفعال‌کردن یک قابلیت/ماژول، افزایش
          سقف/حد، یا ارائهٔ اطلاعات. هیچ‌چیز خراب نیست؛ کاربر می‌خواهد چیزی داده/راه‌اندازی/
          تنظیم شود. آزمونِ کلیدی: اگر این قابلیت برای این کاربر هرگز فراهم نبوده و حالا
          درخواست می‌شود، Service Request است — حتی اگر کاربر بنویسد «نمی‌توانم» یا «مشکل دارم».
          همچنین درخواست برای *لغو/حذف/اصلاحِ* یک رکوردِ ثبت‌شده (مثلِ مرخصی، ماموریت، یا
          اطلاعاتِ اشتباه) Service Request است — حتی اگر کاربر هنگامِ حذف با خطا مواجه شود؛
          چون خواستهٔ اصلی «تغییرِ داده» است، نه تعمیرِ یک خرابی.
        cues:
          - دسترسی
          - ایجاد
          - اضافه کردن
          - تعریف
          # - "لغو مرخصی"
          # - "حذف مرخصی"
          # - "حذف درخواست"
          # - "حذف ماموریت"
          # - "لغو"
          # - "اصلاح"
          # - "ایجاد گردد"
          # - "ایجاد شود"
          # - "ایجاد کنید"
          # - اعطا
          # - "تعریف گردد"
          # - "تعریف شود"
          # - "اضافه گردد"
          # - "اضافه شود"
          # - "فعال‌سازی"
          # - "فعال شود"
          # - "فعال گردد"
          # - غیرفعال
          # - "آزاد کردن"
          # - "آزاد شود"
          # - "افزایش سقف"
          # - تخصیص
          # - "راه‌اندازی"
          - درخواست

  # -------------------------------------------------------------------------
  - id: layer2
    name: "Domain / حوزه"
    role: domain
    description: >
      حوزه یا اپلیکیشن مربوط به تیکت را مشخص می‌کند؛ مستقل از اینکه مشکل (Incident)
      است یا درخواست (Service Request).
    labels:
      - id: erp
        name: "ERP"
        definition: >
          سامانهٔ منابع انسانی/اداری: حضور و غیاب و کارکرد (پانچ، ورود و خروج، تایم‌شیت)،
          مرخصی و ماموریت، حقوق و دستمزد و فیش حقوقی، اطلاعاتِ پرسنلی.
        cues:
          - "تایم‌شیت"
          - "تایم شیت"
          - "timesheet"
          - "ورود و خروج"
          - "ورود خروج"
          - "پانچ"
          - "punch"
          - "حضور و غیاب"
          - "مرخصی"
          - "leave"
          - "ماموریت"
      - id: staff
        name: "Staff"
        definition: >
          سامانهٔ «Staff» و حوزه‌های آن: (۱) ارزیابیِ عملکرد — ثبتِ نمره، اهداف/هدف‌گذاری،
          خودارزیابی، Evaluation for Manager، و تنظیمِ مدیر/مدیرِ لاین برای ارزیابی؛ (۲) پاداش
          و جبرانِ خدمات؛ (۳) مدیریت/فعال‌سازیِ ماژول‌ها مانند ماژولِ وام، گزینهٔ Loan، سقفِ
          ضمانت، صندوق (اینترنال/اکسترنال) و حقِ عضویت؛ یا مواردی مانند درخواست وام و عموما هرجایی وام را دیدی مربوط به Staff است.
        cues:
          - "ارزیابی"
          - "evaluation"
          - "پاداش قدردانی"
          - "جبران خدمات"
          - "ماژول وام"
          - "درخواست وام"
          - "وام"
          - "گزینه loan"
          - "سقف ضمانت"
          - "صندوق اینترنال"
          - "صندوق اکسترنال"
          - "حق عضویت"
          - "category"
          - "nakccess"
# ============================================================================
#  نقشهٔ سیگنالِ متخصص (کلیدواژه → حوزه + نوع، همراه با اولویت)
#  هر کلیدواژه «هم‌زمان» حوزه و نوع را می‌گوید. عدد کوچکتر = اولویتِ زودتر سیگنال
#  (هرچه کوچکتر، تعیین‌کننده‌تر؛ هنگام تعارضِ دو کلیدواژه، کوچکتر برنده است).
# ============================================================================
signals:
  domain_type:
    - domain: erp
      type: service_request
      keywords: [["فیش حقوقی", 3], ["عنوان شغلی", 4], ["پایه سنوات", 2], ["تایم شیت اپرور", 1]]
    - domain: erp
      type: incident
      keywords: [["ورود خروج", 1], ["تایم شیت", 1], ["پانچ", 1], ["Punch", 1], ["دستگاه حضور غیاب", 1], ["Gate", 1], ["گیت", 1]]
    - domain: staff
      type: incident
      keywords: [["دکمه اپرو", 2]]
    - domain: staff
      type: service_request
      keywords: [["گزینه Loan", 1], ["سقف ضمانت", 2], ["ماژول وام", 1], ["حق عضویت", 1], ["صندوق اینترنال", 5], ["صندوق اکسترنال", 5], ["category", 3]]
    - domain: staff
      type: incident
      keywords: [["ارزیابی عملکرد", 3], ["ثبت نمره", 3], ["اهداف", 2], ["پاداش", 2], ["لاگین", 2], ["لپ تاپ", 2], ["VPN", 2], ["ایمیل", 2], ["Nakccess", 3]]
  type_general:
    - type: incident
      keywords: [["عدم ثبت", 1], ["غیبت", 1], ["کسر کار", 1]]
  rules:
    - "اگر جمله‌ای شاملِ «دسترسی» باشد و همراهِ آن یکی از {قطع، خطا، مشکل، عدم} یا یک فعلِ منفی بیاید، آن تیکت Incident است؛ در غیر این صورت «دسترسی» نشانهٔ Service Request است."
    - "حوزه (Domain): تیکت‌های ارزیابیِ عملکرد/نمره/اهداف/پاداش و نیز مسائلِ IT (لاگین، لپ‌تاپ، ویندوز، VPN، ایمیل، شبکه/LAN، Nakccess) در حوزهٔ Staff هستند؛ حضور و غیاب/مرخصی/ماموریت/حقوق و فیش در حوزهٔ ERP. جریانِ خطادارِ «ثبتِ درخواست وام» بدونِ اشاره به ماژول/سامانهٔ Staff معمولاً ERP است."
    - "نوع (Type): درخواستِ لغو/حذف/اصلاحِ یک رکوردِ ثبت‌شده (مرخصی، ماموریت، اطلاعات) Service Request است، حتی اگر کاربر از خطا هنگامِ حذف بگوید."

# ============================================================================
#  یادداشتِ حوزه‌بندی (بر پایهٔ داده‌های واقعی):
#  • «ارزیابیِ عملکرد» (نمره/اهداف/پاداش/Evaluation) در این سازمان حوزهٔ Staff است،
#    نه ERP. مسائلِ IT (لاگین/لپ‌تاپ/VPN/ایمیل/شبکه/Nakccess) هم Staff‌اند.
#  • وام: «ماژول/گزینه/سقف ضمانت/صندوق» → Staff؛ ولی «جریانِ خطادارِ ثبتِ درخواست وام»
#    بدونِ اشاره به ماژول، در داده‌ها ERP برچسب خورده — ناحیهٔ ابهام؛ نیازمندِ تأییدِ کسب‌وکار.
# ============================================================================
