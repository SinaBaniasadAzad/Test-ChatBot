# ============================================================================
#  Taxonomy — تعریف دسته‌ها (منبع واحد حقیقت)
# ----------------------------------------------------------------------------
#  افزودن دستهٔ جدید = افزودن یک بلوک label اینجا. هیچ تغییری در کد لازم نیست.
#
#  هر «layer» یک بُعد دسته‌بندی است. هر «label» یک گزینه در آن بُعد.
#  - id    : slug پایدار و یکتا (مدل همین را برمی‌گرداند، نه نام نمایشی)
#  - name  : نام نمایشی
#  - definition : تعریف دقیق (به مدل تزریق می‌شود)
#  - cues  : کلمات/عبارات نشانه‌ای (فارسی و انگلیسی). فقط «راهنما» هستند، نه قانون قطعی.
# ============================================================================

meta:
  languages: [fa, en]
  notes: "Layer ids are JSON keys in the model output. Label ids are stable slugs."

layers:
  # -------------------------------------------------------------------------
  - id: layer1
    name: "Type / نوع درخواست"
    role: intent
    description: >
      قصدِ کاربر را مشخص می‌کند، مستقل از حوزه (Domain).
      برای انتخاب بین Incident و Service Request به «قصد» نگاه کن، نه ادبِ کلمات:
        • Incident = چیزی که باید کار کند خراب/مختل شده و باید به حالت عادی برگردد
          (خطا، پیام خطا، قطعی، کرش، نتیجهٔ نادرست، یا عملکردی که قبلاً بود و حالا نیست).
        • Service Request = درخواستِ فراهم‌کردن/اعطا/ایجاد/فعال‌سازی/پیکربندیِ چیزی
          (دسترسی، حساب، نقش، مجوز، فعال/غیرفعال‌کردن قابلیت، افزایش سقف، یا ارائهٔ اطلاعات)
          که کاربر تا کنون نداشته؛ هیچ‌چیز خراب نشده.
      مهم‌ترین قاعده: اگر کاربر در انجامِ کارِ عادیِ خود «مسدود» شده یا سیستم کارِ اشتباه
      کرده — مثلِ «امکانِ ثبت/تایید/عودت وجود ندارد»، «گزینه فعال نیست»، «اشتباه محاسبه/ثبت
      شده»، «ارسال/سینک نمی‌شود»، «جایی تعریف نشده»، «ایمیل/دسترسی ندارد» — این Incident است،
      حتی اگر کاربر راهِ‌حل را به‌صورتِ «حذف کن/تغییر بده/ایجاد کن/مساعدت کن» بنویسد. فعلِ
      درخواستی «راهِ‌حلِ پیشنهادیِ کاربر» است، نه ماهیتِ تیکت.
    labels:
      - id: incident
        name: "Incident"
        definition: >
          اختلال در سرویسی که باید کار کند: خطا/پیام خطا، کرش، قطعی، نتیجهٔ نادرست، یا
          چیزی که قبلاً درست کار می‌کرد و حالا از کار افتاده. کاربر می‌خواهد عملکردِ
          خراب‌شده به حالت عادی برگردد. اگر کاربر «مسدود» شده (امکانِ کاری وجود ندارد،
          گزینه فعال نیست) یا سیستم خطا/محاسبهٔ اشتباه/عدمِ ارسال‌وسینک دارد، Incident است —
          حتی اگر راهِ‌حل را به‌صورتِ حذف/تغییر/ایجاد بنویسد. صرفِ «مشکل» یا «نمی‌توانم» کافی
          نیست؛ باید یک خرابی/مسدودیتِ واقعی در عملکرد باشد.
        cues:
          - "عدم ثبت"
          - غیبت
          - "کسر کار"
          - قطع
          - "پردازش نشده"
          - همپوشانی
          - خطا
          - error
          - "پیام خطا"
          - کرش
          - crash
          - "از کار افتاد"
          - "کار نمی‌کند"
          - "کار نمیکند"
          - "قطع شد"
          - قطعی
          - "بالا نمی‌آید"
          - "لود نمی‌شود"
          - "نمایش نمی‌دهد"
          - "به درستی ثبت نشده"
          - "ثبت نمی‌شود"
          - "اشتباه محاسبه"
          - "اشتباه محاسبه شده"
          - "محاسبه نشده"
          - ناموفق
          - failed
          - "فعال نمیباشد"
          - "فعال نبودن"
          - "فعال نیست"
          - "سینک نمی‌شود"
          - "سینک نمیشود"
          - "ارسال نمی‌شود"
          - "ارسال نمیشود"
          - "امکان ثبت"
          - "امکان تایید"
          - "امکان عودت"
      - id: service_request
        name: "Service Request"
        definition: >
          درخواست برای فراهم‌کردن، اضافه‌کردن، ایجاد، فعال‌سازی، یا پیکربندیِ چیزی — مانند
          دسترسی، حساب کاربری، نقش، مجوز، فعال/غیرفعال‌کردن یک قابلیت/ماژول، افزایش
          سقف/حد، یا ارائهٔ اطلاعات. هیچ‌چیز خراب نیست؛ کاربر می‌خواهد چیزی داده/راه‌اندازی/
          تنظیم شود. آزمونِ کلیدی: اگر این قابلیت برای این کاربر هرگز فراهم نبوده و حالا
          درخواست می‌شود، Service Request است.
          همچنین «لغو/حذف/اصلاحِ یک رکوردِ ثبت‌شده» فقط وقتی Service Request است که هیچ
          خرابی/مسدودیتی در میان نباشد و کاربر صرفاً یک اشتباهِ سادهٔ خودش را اصلاح کند
          (مثلِ «اشتباهی مرخصی زدم، لغو کنید»). اگر سیستم او را مسدود کرده یا خطایی رخ داده،
          آن تیکت Incident است، نه Service Request.
        cues:
          - دسترسی
          - "ایجاد گردد"
          - "ایجاد شود"
          - "ایجاد کنید"
          - اعطا
          - "تعریف گردد"
          - "تعریف شود"
          - "اضافه گردد"
          - "اضافه شود"
          - "اضافه کنید"
          - "فعال شود"
          - "فعال گردد"
          - "فعال‌سازی"
          - "آزاد سازی"
          - "آزاد کردن"
          - "افزایش سقف"
          - تخصیص
          - "راه‌اندازی"

  # -------------------------------------------------------------------------
  - id: layer2
    name: "Domain / حوزه"
    role: domain
    description: >
      حوزه یا اپلیکیشن مربوط به تیکت را مشخص می‌کند؛ مستقل از اینکه مشکل (Incident)
      است یا درخواست (Service Request).
    labels:
      - id: erp
        name: "ERP"
        definition: >
          سامانهٔ منابع انسانی/اداری: حضور و غیاب و کارکرد (پانچ، ورود و خروج، تایم‌شیت)،
          مرخصی و ماموریت، حقوق و دستمزد و فیش حقوقی، اطلاعاتِ پرسنلی.
        cues:
          - "تایم‌شیت"
          - "تایم شیت"
          - "timesheet"
          - "ورود و خروج"
          - "ورود خروج"
          - "پانچ"
          - "punch"
          - "حضور و غیاب"
          - "مرخصی"
          - "leave"
          - "ماموریت"
      - id: staff
        name: "Staff"
        definition: >
          سامانهٔ «Staff» و حوزه‌های آن: (۱) ارزیابیِ عملکرد — ثبتِ نمره، اهداف/هدف‌گذاری،
          خودارزیابی، Evaluation for Manager، و تنظیمِ مدیر/مدیرِ لاین برای ارزیابی؛ (۲) پاداش
          و جبرانِ خدمات؛ (۳) مدیریت/فعال‌سازیِ ماژول‌ها مانند ماژولِ وام، گزینهٔ Loan، سقفِ
          ضمانت، صندوق (اینترنال/اکسترنال) و حقِ عضویت؛ یا مواردی مانند درخواست وام و عموما هرجایی وام را دیدی مربوط به Staff است.
          تغییر پوزیشن مربوط به Staff است.
        cues:
          - "ارزیابی"
          - "تغییر پوزیشن"
          - "evaluation"
          - "پاداش قدردانی"
          - "جبران خدمات"
          - "ماژول وام"
          - "درخواست وام"
          - "Compensation"
          - "وام"
          - "ATS"
          - "loan"
          - "سقف ضمانت"
          - "صندوق اینترنال"
          - "صندوق اکسترنال"
          - "حق عضویت"
          - "category"
          - "nakccess"
# ============================================================================
#  نقشهٔ سیگنالِ متخصص (کلیدواژه → حوزه + نوع، همراه با اولویت)
#  هر کلیدواژه «هم‌زمان» حوزه و نوع را می‌گوید. عدد = اولویت/قدرتِ سیگنال
#  (طبق متنِ prompt، عددِ بزرگ‌تر تعیین‌کننده‌تر است؛ هنگام تعارض، بزرگ‌تر برنده).
# ============================================================================
signals:
  domain_type:
    - domain: erp
      type: service_request
      keywords:
        - ["فیش حقوقی", 3]
        - ["عنوان شغلی", 4]
        - ["پایه سنوات", 2]
        - ["تایم شیت اپرور", 1]

    - domain: erp
      type: incident
      keywords:
        - ["ورود خروج", 1]
        - ["تایم شیت", 1]
        - ["پانچ", 1]
        - ["Punch", 1]
        - ["دستگاه حضور غیاب", 1]
        - ["Gate", 1]
        - ["گیت", 1]

    - domain: staff
      type: service_request
      keywords:
        - ["Loan", 1]
        - ["وام بلند مدت", 1]
        - ["وام کوتاه مدت", 1]
        - ["سقف ضمانت", 2]
        - ["ماژول وام", 1]
        - ["حق عضویت", 1]
        - ["صندوق اینترنال", 5]
        - ["صندوق اکسترنال", 5]
        - ["category", 3]

    - domain: staff
      type: incident
      keywords:
        - ["دکمه اپرو", 2]
        - ["ارزیابی عملکرد", 3]
        - ["ثبت نمره", 3]
        - ["اهداف", 2]
        - ["پاداش", 2]
        - ["لاگین", 2]
        - ["لپ تاپ", 2]
        - ["VPN", 2]
        - ["ایمیل", 2]
        - ["Nakccess", 3]
        - ["سفته", 1]

  type_general:
    - type: incident
      keywords:
        - ["عدم ثبت", 1]
        - ["غیبت", 1]
        - ["کسر کار", 1]
  rules:
    - "اگر جمله‌ای شاملِ «دسترسی» باشد و همراهِ آن یکی از {قطع، خطا، مشکل، عدم} یا یک فعلِ منفی بیاید، آن تیکت Incident است؛ در غیر این صورت «دسترسی» نشانهٔ Service Request است."
    - "نوع (Type) — مهم: اگر سیستم کاربر را «مسدود» کرده یا کارِ اشتباه انجام داده (امکانِ ثبت/تایید/عودت وجود ندارد، گزینه فعال نیست، اشتباه محاسبه/ثبت شده، ارسال/سینک نمی‌شود، جایی تعریف نشده، ایمیل/دسترسی ندارد) → Incident است، حتی اگر کاربر بنویسد «حذف/تغییر/ایجاد/مساعدت کن». فعلِ درخواستی راهِ‌حل است، نه ماهیتِ تیکت."
    - "نوع (Type): «لغو/حذف/اصلاحِ یک رکورد» فقط وقتی Service Request است که هیچ خطا/مسدودیتی نباشد و صرفاً اشتباهِ سادهٔ خودِ کاربر باشد (مثل: اشتباهی مرخصی زدم، لغو کنید)."
    - "حوزه (Domain): ارزیابیِ عملکرد/نمره/اهداف، و وام/ضمانت/صندوق و تغییر پوزیشن → Staff؛ حضور و غیاب/مرخصی/ماموریت/حقوق و فیش → ERP. توجه: «دورهٔ پاداش/جبران خدمات» (ایجاد/حذف/انتقالِ دوره) در داده‌ها گاهی ERP است — ناحیهٔ ابهام."

# ============================================================================
#  یادداشتِ حوزه‌بندی (بر پایهٔ داده‌های واقعی):
#  • وام/ضمانت/صندوق، ارزیابیِ عملکرد، و تغییر پوزیشن → Staff.
#  • ناحیهٔ ابهامِ شناخته‌شده (لیبل‌ها ناسازگارند، نیازمندِ ممیزیِ کسب‌وکار):
#    «پاداش» و «جبران خدمات» گاهی Staff و گاهی ERP برچسب خورده‌اند (به‌خصوص «دورهٔ» آن‌ها).
# ============================================================================
